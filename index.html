<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light dark" />
<title>OLX Monitor — panel</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #1b1f24;
    --muted: #6a7280;
    --line: #e3e6ea;
    --accent: #1f7a3d;
    --accent-h: #196531;
    --danger: #c23b3b;
    --danger-h: #a02f2f;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 6px 20px rgba(0,0,0,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171b; --card: #1e2227; --text: #e8eaed; --muted: #98a0aa;
      --line: #2c313700; --line: #2c3137; --accent: #38a35a; --accent-h: #2f8c4d;
      --danger: #e05656; --danger-h: #c94848;
      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 20px 14px 60px;
  }
  .wrap { max-width: 680px; margin: 0 auto; }
  header { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
  h1 { font-size: 1.35rem; margin: 0; letter-spacing: -.01em; }
  .app-version { font-size: .72rem; color: var(--muted); white-space: nowrap; }
  .sub { color: var(--muted); font-size: .85rem; margin: 0 0 18px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px;
  }
  label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin: 0 0 5px; }
  input[type=text], input[type=url], input[type=password] {
    width: 100%; padding: 11px 12px; font-size: 15px; color: var(--text);
    background: var(--bg); border: 1px solid var(--line); border-radius: 10px; outline: none;
  }
  input:focus { border-color: var(--accent); }
  .field { margin-bottom: 12px; }
  button {
    font: inherit; font-weight: 600; cursor: pointer; border: none; border-radius: 10px;
    padding: 11px 16px; color: #fff; background: var(--accent); transition: background .15s;
  }
  button:hover { background: var(--accent-h); }
  button:disabled { opacity: .55; cursor: default; }
  button.ghost { background: transparent; color: var(--muted); padding: 6px 8px; }
  button.ghost:hover { background: transparent; color: var(--text); }
  button.del { background: var(--danger); padding: 8px 12px; font-size: .85rem; }
  button.del:hover { background: var(--danger-h); }
  .row { display: flex; align-items: center; gap: 12px; padding: 13px 4px; border-top: 1px solid var(--line); }
  .row:first-child { border-top: none; }
  .row .info { flex: 1; min-width: 0; }
  .row .t { font-weight: 600; }
  .row a { color: var(--muted); font-size: .78rem; text-decoration: none; word-break: break-all; }
  .row a:hover { color: var(--accent); text-decoration: underline; }
  .empty { color: var(--muted); text-align: center; padding: 22px 0; }
  .msg { padding: 10px 12px; border-radius: 10px; font-size: .88rem; margin-bottom: 12px; display: none; }
  .msg.err { display: block; background: rgba(194,59,59,.12); color: var(--danger); }
  .msg.ok  { display: block; background: rgba(31,122,61,.12); color: var(--accent); }
  .foot { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 8px; }
  .foot a { color: var(--muted); }
  .hidden { display: none !important; }
  .spin { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.4);
          border-top-color: #fff; border-radius: 50%; animation: r .7s linear infinite; vertical-align: -3px; }
  @keyframes r { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🔎 OLX Monitor</h1>
    <span class="app-version">v2026-07-20</span>
  </header>
  <p class="sub">Linki, które ma obserwować bot. Każdy dostaje własny tytuł — pojawia się na górze powiadomienia na Slacku.</p>

  <!-- Token gate -->
  <div id="gate" class="card hidden">
    <label for="tok">Token panelu</label>
    <div class="field"><input id="tok" type="password" placeholder="wklej token" autocomplete="off" /></div>
    <button id="tokSave">Zapisz i wejdź</button>
    <p class="foot" style="text-align:left;margin-top:10px">Token ustawiasz raz — zapisuje się w tej przeglądarce.</p>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden">
    <div id="msg" class="msg"></div>

    <div class="card">
      <div class="field">
        <label for="title">Tytuł wyszukiwania (widoczny na Slacku)</label>
        <input id="title" type="text" placeholder="np. BMW E90 do 20 tys." maxlength="80" />
      </div>
      <div class="field">
        <label for="url">Link OLX (skopiuj z paska adresu po ustawieniu filtrów)</label>
        <input id="url" type="url" placeholder="https://www.olx.pl/motoryzacja/samochody/..." />
      </div>
      <button id="add">➕ Dodaj do obserwowanych</button>
    </div>

    <div class="card">
      <div id="list"><div class="empty">Ładowanie…</div></div>
    </div>

    <p class="foot">
      Bot sprawdza OLX co minutę · <a id="clearTok" href="#">zmień token</a>
    </p>
  </div>
</div>

<script>
const BASE = "https://olx-monitor.maciekwojciechowski03.workers.dev";
const TOK_KEY = "olx_panel_token";

const $ = (id) => document.getElementById(id);
let token = localStorage.getItem(TOK_KEY) || "";

function showMsg(text, kind) {
  const m = $("msg");
  m.textContent = text;
  m.className = "msg " + kind;
  if (kind === "ok") setTimeout(() => { m.className = "msg"; }, 3500);
}

async function api(method, path, body) {
  const opt = { method, headers: { "X-Panel-Token": token } };
  if (body) { opt.headers["Content-Type"] = "application/json"; opt.body = JSON.stringify(body); }
  const res = await fetch(BASE + path, opt);
  let data = null;
  try { data = await res.json(); } catch {}
  if (res.status === 401) { openGate(); throw new Error("Zły token — wpisz go ponownie."); }
  if (!res.ok) throw new Error((data && data.error) || ("Błąd HTTP " + res.status));
  return data;
}

function render(targets) {
  const list = $("list");
  if (!targets || targets.length === 0) {
    list.innerHTML = '<div class="empty">Brak obserwowanych linków. Dodaj pierwszy powyżej.</div>';
    return;
  }
  list.innerHTML = "";
  for (const t of targets) {
    const row = document.createElement("div");
    row.className = "row";
    const info = document.createElement("div");
    info.className = "info";
    const tt = document.createElement("div");
    tt.className = "t";
    tt.textContent = t.title;
    const a = document.createElement("a");
    a.href = t.url; a.target = "_blank"; a.rel = "noopener"; a.textContent = t.url;
    info.appendChild(tt); info.appendChild(a);
    const btn = document.createElement("button");
    btn.className = "del"; btn.textContent = "Usuń";
    btn.onclick = () => del(t.id, t.title, btn);
    row.appendChild(info); row.appendChild(btn);
    list.appendChild(row);
  }
}

async function load() {
  try { render(await api("GET", "/targets")); }
  catch (e) { showMsg(e.message, "err"); }
}

async function add() {
  const title = $("title").value.trim();
  const url = $("url").value.trim();
  if (!title) return showMsg("Podaj tytuł wyszukiwania.", "err");
  if (!url) return showMsg("Wklej link OLX.", "err");
  const btn = $("add");
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Sprawdzam link…';
  try {
    const targets = await api("POST", "/targets", { title, url });
    $("title").value = ""; $("url").value = "";
    render(targets);
    showMsg("Dodano: " + title, "ok");
  } catch (e) { showMsg(e.message, "err"); }
  finally { btn.disabled = false; btn.textContent = "➕ Dodaj do obserwowanych"; }
}

async function del(id, title, btn) {
  if (!confirm('Usunąć „' + title + '” z obserwowanych?')) return;
  btn.disabled = true;
  try { render(await api("DELETE", "/targets?id=" + encodeURIComponent(id))); showMsg("Usunięto: " + title, "ok"); }
  catch (e) { showMsg(e.message, "err"); btn.disabled = false; }
}

function openGate() {
  $("app").classList.add("hidden");
  $("gate").classList.remove("hidden");
  $("tok").focus();
}
function openApp() {
  $("gate").classList.add("hidden");
  $("app").classList.remove("hidden");
  load();
}

$("tokSave").onclick = () => {
  const v = $("tok").value.trim();
  if (!v) return;
  token = v; localStorage.setItem(TOK_KEY, v);
  openApp();
};
$("tok").addEventListener("keydown", (e) => { if (e.key === "Enter") $("tokSave").click(); });
$("add").onclick = add;
$("url").addEventListener("keydown", (e) => { if (e.key === "Enter") add(); });
$("clearTok").onclick = (e) => { e.preventDefault(); localStorage.removeItem(TOK_KEY); token = ""; $("tok").value = ""; openGate(); };

if (token) openApp(); else openGate();
</script>
</body>
</html>
